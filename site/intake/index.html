<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start workflow — Real Estate AI Agent</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="intake.css" />
</head>
<body>
  <header>
    <h1>Real Estate AI Agent</h1>
    <p class="tagline" id="workflow-type-label">Buy workflow</p>
  </header>

  <main id="intake-app">
    <!-- Auth gate is kept in markup but immediately hidden by intake.js after requireAuth() -->
    <div id="auth-gate" class="auth-gate hidden">
      <h2>Sign in to continue</h2>
      <p>You need to be signed in to start a workflow.</p>
      <a href="../login/" class="btn btn--approve">Sign in</a>
    </div>

    <form id="intake-form" class="intake-form hidden" novalidate>
      <div id="intake-error" class="hidden" style="color:#c0392b;margin-bottom:1rem;font-size:0.9rem;"></div>
      <div class="steps" id="steps">
        <!-- Steps rendered by intake.js -->
      </div>

      <div class="form-nav">
        <button type="button" id="prev-btn" class="btn btn--counter hidden">← Back</button>
        <button type="button" id="next-btn" class="btn btn--approve">Next →</button>
        <button type="submit" id="submit-btn" class="btn btn--approve hidden">Submit →</button>
      </div>
    </form>

    <div id="success-message" class="success-message hidden">
      <h2>Workflow started!</h2>
      <p>
        Your requirements are being processed. The agent will post a shortlist
        within 15 minutes.
      </p>
      <a id="workflow-link" class="btn btn--approve" href="#">View your workflow →</a>
    </div>
  </main>

  <script type="module" src="intake.js"></script>
</body>
</html>
