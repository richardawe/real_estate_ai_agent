name: Advance

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to advance (omit to process all active workflows)"
        required: false
        type: string
  schedule:
    - cron: "0 * * * *"   # Hourly

concurrency:
  group: advance-${{ github.event.inputs.issue_number || 'all' }}
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run advance tick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '' }}
        run: python -m workflows_lib.advance_action
