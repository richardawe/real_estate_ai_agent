name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config
        env:
          SITE_GITHUB_PAT: ${{ secrets.SITE_GITHUB_PAT }}
        run: |
          if [ -z "$SITE_GITHUB_PAT" ]; then
            echo "::error::SITE_GITHUB_PAT secret is not set — add it under Settings → Secrets → Actions"
            exit 1
          fi
          sed -i "s|YOUR_FINE_GRAINED_PAT|${SITE_GITHUB_PAT}|g" site/config.js
          echo "Config injection OK (token length: ${#SITE_GITHUB_PAT})"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
